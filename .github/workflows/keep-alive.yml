name: Keep HF Space Alive

on:
  schedule:
    # Ping every 14 minutes — HF free-tier sleeps after ~48h of inactivity,
    # but the Gradio app itself can timeout/unload much sooner.
    - cron: '*/14 * * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping HF Space
        run: |
          echo "Pinging HF Space to prevent cold sleep..."
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 30 \
            "https://nduka1999-ppe.hf.space/")
          echo "HF Space response: $HTTP_CODE"
          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 500 ]; then
            echo "Space is alive"
          else
            echo "Space may be rebuilding or down (HTTP $HTTP_CODE)"
          fi

      - name: Ping Vercel Frontend
        run: |
          echo "Pinging Vercel frontend..."
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 15 \
            "https://ppe-detection-blush.vercel.app/")
          echo "Vercel response: $HTTP_CODE"
